<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recover Access – WebAuthn Study</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>

  <body class="bg-light">
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-5">
          <div class="card shadow-sm">
            <div class="card-body p-4">
              <h4 class="card-title mb-1">Recover Access</h4>
              <p class="text-muted small mb-4">
                Choose a recovery option to regain access to your account.
              </p>

              <div id="alert-box" class="d-none alert" role="alert"></div>

              <div class="mb-3">
                <label for="username" class="form-label">Email address</label>
                <input
                  type="email"
                  class="form-control"
                  id="username"
                  placeholder="you@example.com"
                  autocomplete="username"
                />
              </div>

              <div class="d-grid gap-2 mb-3">
                <button class="btn btn-primary" id="backup-code-btn">
                  Use backup code
                </button>

                <button class="btn btn-outline-primary" id="new-passkey-btn">
                  Register a new passkey
                </button>

                <button class="btn btn-outline-secondary" id="support-btn">
                  Contact support
                </button>
              </div>

              <p class="text-center small text-muted">
                This recovery process is simulated for the usability study.
              </p>

              <hr />

              <p class="text-center small">
                Remembered your passkey?
                <a href="/login.html" id="back-login-link">Back to sign in</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const usernameInput = document.getElementById("username");
      const alertBox = document.getElementById("alert-box");

      const params = new URLSearchParams(window.location.search);
      const emailFromUrl = params.get("email");

      if (emailFromUrl) {
        usernameInput.value = emailFromUrl;
      }

      logEvent("recovery_page_view", "recovery", null, null);

      document
        .getElementById("backup-code-btn")
        .addEventListener("click", async () => {
          const username = usernameInput.value.trim();

          if (!username) {
            showAlert("Please enter your email address first.", "warning");
            await logEvent(
              "recovery_missing_email",
              "recovery",
              false,
              "Email missing on recovery screen",
            );
            return;
          }

          await logEvent(
            "recovery_backup_code_selected",
            "recovery",
            true,
            null,
          );

          showAlert(
            "Backup code option selected. Recovery task complete.",
            "success",
          );
        });

      document
        .getElementById("new-passkey-btn")
        .addEventListener("click", async () => {
          const username = usernameInput.value.trim();

          if (!username) {
            showAlert("Please enter your email address first.", "warning");
            await logEvent(
              "recovery_missing_email",
              "recovery",
              false,
              "Email missing before new passkey option",
            );
            return;
          }

          await logEvent(
            "recovery_new_passkey_selected",
            "recovery",
            true,
            null,
          );

          showAlert(
            "New passkey option selected. Redirecting to registration...",
            "success",
          );

          setTimeout(() => {
            window.location.href =
              "/register.html?email=" + encodeURIComponent(username);
          }, 1500);
        });

      document
        .getElementById("support-btn")
        .addEventListener("click", async () => {
          const username = usernameInput.value.trim();

          if (!username) {
            showAlert("Please enter your email address first.", "warning");
            await logEvent(
              "recovery_missing_email",
              "recovery",
              false,
              "Email missing before support option",
            );
            return;
          }

          await logEvent("recovery_support_selected", "recovery", true, null);

          showAlert(
            "Support option selected. Recovery request simulated.",
            "success",
          );
        });

      document
        .getElementById("back-login-link")
        .addEventListener("click", async () => {
          await logEvent("recovery_back_to_login", "recovery", null, null);
        });

      function showAlert(message, type) {
        alertBox.className = `alert alert-${type}`;
        alertBox.textContent = message;
        alertBox.classList.remove("d-none");
      }

      async function logEvent(eventType, task, success, errorMessage) {
        try {
          await fetch("/api/auth/log", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              eventType,
              task,
              success,
              errorMessage,
            }),
          });
        } catch (_) {
          // Logging should not break the user flow
        }
      }
    </script>
  </body>
</html>
