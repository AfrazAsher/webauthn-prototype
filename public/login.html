<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In – WebAuthn Study</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body class="bg-light">
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-5">
          <div class="card shadow-sm">
            <div class="card-body p-4">
              <h4 class="card-title mb-1">Sign In</h4>
              <p class="text-muted small mb-4">
                Use your registered passkey to sign in
              </p>

              <div id="alert-box" class="d-none alert" role="alert"></div>

              <div class="mb-3">
                <label for="username" class="form-label">Email address</label>
                <input
                  type="email"
                  class="form-control"
                  id="username"
                  placeholder="you@example.com"
                  autocomplete="username webauthn"
                />
              </div>

              <div class="d-grid mb-3">
                <button class="btn btn-primary" id="login-btn">
                  Use your Fingerprint / PIN
                </button>
              </div>

              <p class="text-center small text-muted">
                Your device will verify your identity — no password needed.
              </p>

              <hr />
              <p class="text-center small">
                Not registered yet? <a href="/register.html">Create account</a>
              </p>
              <p class="text-center small">
                Having trouble? <a href="/recovery.html">Recover access</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@simplewebauthn/browser@13.1.0/dist/bundle/index.umd.min.js"></script>
    <script src="/js/webauthn-client.js"></script>
  </body>
</html>
