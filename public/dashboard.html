<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard – WebAuthn Study</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body class="bg-light">
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-5">
          <div class="card shadow-sm">
            <div class="card-body p-4 text-center">
              <div class="mb-3">
                <span style="font-size: 3rem">✅</span>
              </div>
              <h4 class="card-title mb-2">You're signed in</h4>
              <p class="text-muted small mb-4">
                Passkey authentication was successful. This is your dashboard.
              </p>
              <hr />
              <p class="small">
                <a href="/login.html">Sign out and sign in again</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script>
      async function logEvent(eventType, task, success, errorMessage) {
        try {
          await fetch("/api/auth/log", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ eventType, task, success, errorMessage }),
          });
        } catch (_) {}
      }
      logEvent("dashboard_view", "login", true, null);
    </script>
  </body>
</html>
